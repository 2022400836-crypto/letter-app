<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Letters For Xane</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="index.css">
</head>

<body>

  <div class="bg-glow"></div>

  <div class="container">

    <header class="header">
      <h1>Letters For You</h1>
      <p class="subtitle">A space where words are meant for only one person</p>
      <p class="recipient">To: <span>Xane</span></p>
    </header>

    <!-- FORM -->
    <form class="card" id="letterForm">

      <input type="text" name="name" placeholder="Your name" required>
      <textarea name="message" placeholder="Write your letter..." required></textarea>

      <button class="post-btn" type="submit">Send Letter</button>

    </form>

    <!-- POSTED LETTERS AREA -->
    <div class="posted-area">
      <h2>Posted Letters</h2>

      <!-- JS will fill this -->
      <div id="lettersContainer"></div>

    </div>

  </div>

  <!-- SUCCESS MODAL -->
  <div id="successModal" class="success-modal">
    <div class="success-box">
      <div class="checkmark">✓</div>
      <h2>Letter Sent!</h2>
      <p>Your message has been posted successfully.</p>
      <button onclick="closeSuccess()">OK</button>
    </div>
  </div>

  <!-- JS -->
  <script src="index.js"></script>

</body>
</html>
